apiVersion: apps/v1
kind: Deployment
metadata: {name: flow-api}
spec:
  replicas: 3
  selector: {matchLabels: {app: flow-api}}
  template:
    metadata: {labels: {app: flow-api}}
    spec:
      containers:
        - name: api
          image: ghcr.io/bhopal-smart-city/flow-api:latest
          ports: [{containerPort: 8000}]
          readinessProbe: {httpGet: {path: /health, port: 8000}, initialDelaySeconds: 5, periodSeconds: 10}
          resources: {requests: {cpu: 250m, memory: 256Mi}, limits: {cpu: '1', memory: 1Gi}}
---
apiVersion: v1
kind: Service
metadata: {name: flow-api}
spec: {selector: {app: flow-api}, ports: [{port: 80, targetPort: 8000}]}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: {name: flow-api}
spec:
  scaleTargetRef: {apiVersion: apps/v1, kind: Deployment, name: flow-api}
  minReplicas: 3
  maxReplicas: 20
  metrics: [{type: Resource, resource: {name: cpu, target: {type: Utilization, averageUtilization: 65}}}]
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: flow-web}
spec:
  replicas: 2
  selector: {matchLabels: {app: flow-web}}
  template:
    metadata: {labels: {app: flow-web}}
    spec:
      containers:
        - name: web
          image: ghcr.io/bhopal-smart-city/flow-web:latest
          ports: [{containerPort: 3000}]
          resources: {requests: {cpu: 100m, memory: 128Mi}, limits: {cpu: 500m, memory: 512Mi}}
---
apiVersion: v1
kind: Service
metadata: {name: flow-web}
spec: {selector: {app: flow-web}, ports: [{port: 80, targetPort: 3000}]}
